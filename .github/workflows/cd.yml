name: CD

on:
  push:
    branches: [main]
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Only one deployment at a time
concurrency:
  group: cd
  cancel-in-progress: false

# Grant GITHUB_TOKEN permissions for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── Documentation: build + deploy to GitHub Pages ──────────────────────────
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - name: Build MkDocs site
        run: uvx --with mkdocs-material mkdocs build --strict
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  docs-deploy:
    needs: docs-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Databricks: validate + deploy bundle to production ─────────────────────
  # Skipped until DATABRICKS_HOST is set to a real workspace URL.
  # To enable: replace 'none' with your workspace URL in the 'databricks' environment.
  databricks-validate:
    if: vars.DATABRICKS_HOST != 'none'
    runs-on: ubuntu-latest
    environment: databricks
    steps:
      - uses: actions/checkout@v5
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main
      - name: Validate bundle
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate --target prod

  databricks-deploy:
    needs: databricks-validate
    if: vars.DATABRICKS_HOST != 'none'
    runs-on: ubuntu-latest
    environment: databricks
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main
      - name: Build wheel
        run: uv build --wheel
      - name: Deploy bundle to production
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_PROD_WAREHOUSE_ID: ${{ vars.DATABRICKS_PROD_WAREHOUSE_ID }}
          DATABRICKS_SP_NAME: ${{ vars.DATABRICKS_SP_NAME }}
        run: databricks bundle deploy --target prod
