name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: lint + format ──────────────────────────────────────────────────
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - run: uvx ruff check .
      - run: uvx ruff format --check .

  # ── dbt: build + test ─────────────────────────────────────────────────────
  dbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dbt dependencies
        run: uv sync --project dbt_project --no-install-project
      - name: dbt build (models + tests)
        working-directory: dbt_project
        run: uv run dbt build --profiles-dir .

  # ── Python: benchmark tests ────────────────────────────────────────────────
  benchmarks:
    runs-on: ubuntu-latest
    needs: dbt
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dbt dependencies
        run: uv sync --project dbt_project --no-install-project
      - name: Build dbt models
        working-directory: dbt_project
        run: uv run dbt run --profiles-dir .
      - name: Run benchmark queries
        working-directory: dbt_project
        run: uv run pytest ../benchmarks/benchmark_queries.py -v

  # ── Documentation: MkDocs build ────────────────────────────────────────────
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - run: uvx --with mkdocs-material mkdocs build --strict
