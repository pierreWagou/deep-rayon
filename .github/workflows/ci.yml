name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: lint + format ──────────────────────────────────────────────────
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - run: uvx ruff check .
      - run: uvx ruff format --check .

  # ── YAML: lint ─────────────────────────────────────────────────────────────
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - run: uvx yamllint -c .yamllint.yml .

  # ── SQL: lint ──────────────────────────────────────────────────────────────
  sqlfluff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --no-install-project
      - name: Lint dbt SQL models
        run: uv run sqlfluff lint dbt_project/models/ dbt_project/tests/ --ignore parsing

  # ── Python: type checking ──────────────────────────────────────────────────
  ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --no-install-project
      - run: uvx ty check

  # ── Python: unit tests ─────────────────────────────────────────────────────
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --no-install-project
      - name: Run unit tests
        run: uv run pytest tests/ -v

  # ── dbt: build + test ─────────────────────────────────────────────────────
  dbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --no-install-project
      - name: dbt build (models + tests)
        run: uv run dbt build --project-dir dbt_project --profiles-dir dbt_project

  # ── Documentation: MkDocs build ────────────────────────────────────────────
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - run: uvx --with mkdocs-material mkdocs build --strict

  # ── Databricks: validate bundle ────────────────────────────────────────────
  # Skipped until DATABRICKS_HOST is set to a real workspace URL.
  # To enable: replace 'none' with your workspace URL in the 'databricks' environment.
  databricks:
    if: vars.DATABRICKS_HOST != 'none'
    runs-on: ubuntu-latest
    environment: databricks
    steps:
      - uses: actions/checkout@v5
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main
      - name: Validate bundle
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate --target prod
