# dbt unit tests for customer_silver RFM scoring logic
# These test specific transformation behaviors with fixed input data

unit_tests:
  - name: test_rfm_segment_champion
    description: >
      A high-frequency, high-recency, high-monetary client should be Champion.
      20 transactions with spend=100 each in the last 20 days.
    model: customer_silver
    given:
      - input: ref('transactions_bronze')
        rows:
          - {transaction_id: 1, client_id: 100, transaction_date: "2026-04-10", hour: 10, minute: 0, product_id: 1, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 2, client_id: 100, transaction_date: "2026-04-09", hour: 11, minute: 0, product_id: 2, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 3, client_id: 100, transaction_date: "2026-04-08", hour: 12, minute: 0, product_id: 3, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 4, client_id: 100, transaction_date: "2026-04-07", hour: 13, minute: 0, product_id: 1, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 5, client_id: 100, transaction_date: "2026-04-06", hour: 14, minute: 0, product_id: 2, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 6, client_id: 100, transaction_date: "2026-04-05", hour: 15, minute: 0, product_id: 3, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 7, client_id: 100, transaction_date: "2026-04-04", hour: 16, minute: 0, product_id: 1, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 8, client_id: 100, transaction_date: "2026-04-03", hour: 17, minute: 0, product_id: 2, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 9, client_id: 100, transaction_date: "2026-04-02", hour: 18, minute: 0, product_id: 3, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 10, client_id: 100, transaction_date: "2026-04-01", hour: 19, minute: 0, product_id: 1, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 11, client_id: 100, transaction_date: "2026-03-31", hour: 10, minute: 0, product_id: 2, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 12, client_id: 100, transaction_date: "2026-03-30", hour: 11, minute: 0, product_id: 3, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 13, client_id: 100, transaction_date: "2026-03-29", hour: 12, minute: 0, product_id: 1, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 14, client_id: 100, transaction_date: "2026-03-28", hour: 13, minute: 0, product_id: 2, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 15, client_id: 100, transaction_date: "2026-03-27", hour: 14, minute: 0, product_id: 3, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 16, client_id: 100, transaction_date: "2026-03-26", hour: 15, minute: 0, product_id: 1, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 17, client_id: 100, transaction_date: "2026-03-25", hour: 16, minute: 0, product_id: 2, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 18, client_id: 100, transaction_date: "2026-03-24", hour: 17, minute: 0, product_id: 3, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 19, client_id: 100, transaction_date: "2026-03-23", hour: 18, minute: 0, product_id: 1, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
          - {transaction_id: 20, client_id: 100, transaction_date: "2026-03-22", hour: 19, minute: 0, product_id: 2, quantity: 10, spend: 100.0, store_id: 1, is_sign_corrected: false}
      - input: ref('clients_bronze')
        rows:
          - {client_id: 100, name: "Champion Client", job: "exec", email: "champ@test.com", account_id: 9999}
      - input: ref('stores_bronze')
        rows:
          - {store_id: 1, latlng: "48.8566,2.3522", opening: "08:00", closing: "20:00", store_type: "hyper", latitude: 48.8566, longitude: 2.3522}
    expect:
      rows:
        - {client_id: 100, rfm_segment: "Champion", customer_status: "Active", is_repeat_customer: true}

  - name: test_customer_lifecycle_new
    description: A client with exactly one transaction should be classified as "New"
    model: customer_silver
    given:
      - input: ref('transactions_bronze')
        rows:
          - {transaction_id: 1, client_id: 100, transaction_date: "2026-04-10", hour: 10, minute: 0, product_id: 1, quantity: 5, spend: 50.0, store_id: 1, is_sign_corrected: false}
      - input: ref('clients_bronze')
        rows:
          - {client_id: 100, name: "New Client", job: "student", email: "new@test.com", account_id: 2000}
      - input: ref('stores_bronze')
        rows:
          - {store_id: 1, latlng: "48.8566,2.3522", opening: "08:00", closing: "20:00", store_type: "express", latitude: 48.8566, longitude: 2.3522}
    expect:
      rows:
        - {client_id: 100, customer_lifecycle_stage: "New", is_repeat_customer: false, frequency: 1}

  - name: test_customer_status_churned
    description: A client with their only transaction 200+ days ago should be Churned
    model: customer_silver
    given:
      - input: ref('transactions_bronze')
        rows:
          - {transaction_id: 1, client_id: 100, transaction_date: "2025-09-01", hour: 10, minute: 0, product_id: 1, quantity: 5, spend: 50.0, store_id: 1, is_sign_corrected: false}
      - input: ref('clients_bronze')
        rows:
          - {client_id: 100, name: "Churned Client", job: "retired", email: "churned@test.com", account_id: 3000}
      - input: ref('stores_bronze')
        rows:
          - {store_id: 1, latlng: "48.8566,2.3522", opening: "08:00", closing: "20:00", store_type: "super", latitude: 48.8566, longitude: 2.3522}
    expect:
      rows:
        - {client_id: 100, customer_status: "Churned", customer_lifecycle_stage: "New", recency_score: 1}
