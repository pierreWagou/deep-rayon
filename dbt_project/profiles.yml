deep_rayon:
  target: dev
  outputs:
    # ── Local development: DuckDB ──
    dev:
      type: duckdb
      path: "dbt_project/target/deep_rayon.duckdb"
      threads: 4

    # ── Production: Databricks + Unity Catalog ──
    # NOTE: When running as a Databricks dbt_task, this profile is IGNORED.
    # Databricks auto-generates its own profile (target: databricks_cluster)
    # using the warehouse_id from the task config. This prod target is only
    # used for manual local runs: dbt run --target prod
    prod:
      type: databricks
      catalog: deep_rayon_catalog
      schema: retail
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      threads: 4
