<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29" />
      <stop offset="50%" style="stop-color:#302b63" />
      <stop offset="100%" style="stop-color:#24243e" />
    </linearGradient>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1640" />
      <stop offset="100%" style="stop-color:#0f0c29" />
    </linearGradient>
    <linearGradient id="shelfLeft" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#5277C3;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#302b63;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="shelfRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5277C3;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#302b63;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="ceilingLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0b0ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#e0b0ff;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" />

  <!-- ================================================================ -->
  <!-- SUPERMARKET AISLE — one-point perspective, vanishing at center    -->
  <!-- ================================================================ -->

  <!-- Ceiling -->
  <rect x="0" y="0" width="800" height="60" fill="#0f0c29" opacity="0.5" />

  <!-- Ceiling light strips converging to vanishing point (400, 100) -->
  <line x1="400" y1="100" x2="0" y2="0" stroke="#e0b0ff" stroke-width="0.8" opacity="0.12" />
  <line x1="400" y1="100" x2="200" y2="0" stroke="#e0b0ff" stroke-width="0.8" opacity="0.12" />
  <line x1="400" y1="100" x2="600" y2="0" stroke="#e0b0ff" stroke-width="0.8" opacity="0.12" />
  <line x1="400" y1="100" x2="800" y2="0" stroke="#e0b0ff" stroke-width="0.8" opacity="0.12" />

  <!-- Fluorescent ceiling lights — two strips receding into distance -->
  <!-- Near light (wide) -->
  <rect x="330" y="18" width="140" height="3" rx="1" fill="#e0b0ff" opacity="0.3" filter="url(#glow)" />
  <!-- Mid light -->
  <rect x="360" y="40" width="80" height="2.5" rx="1" fill="#e0b0ff" opacity="0.25" filter="url(#glow)" />
  <!-- Far light -->
  <rect x="378" y="55" width="44" height="2" rx="1" fill="#e0b0ff" opacity="0.2" filter="url(#glow)" />
  <!-- Vanishing light -->
  <rect x="390" y="65" width="20" height="1.5" rx="1" fill="#e0b0ff" opacity="0.15" filter="url(#glow)" />

  <!-- Light cone from nearest fixture -->
  <polygon points="330,21 470,21 440,60 360,60" fill="url(#ceilingLight)" opacity="0.15" />

  <!-- ================================================================ -->
  <!-- LEFT SHELVING UNIT                                                -->
  <!-- Trapezoid: near edge at left, converges to vanishing point        -->
  <!-- ================================================================ -->

  <!-- Left shelf back panel -->
  <polygon points="0,15 335,72 335,185 0,200" fill="#151230" stroke="#5277C3" stroke-width="0.5" opacity="0.6" />

  <!-- Left shelf rows (horizontal lines, getting closer together toward VP) -->
  <line x1="0" y1="50" x2="335" y2="85" stroke="#5277C3" stroke-width="0.8" opacity="0.35" />
  <line x1="0" y1="90" x2="335" y2="100" stroke="#5277C3" stroke-width="0.8" opacity="0.35" />
  <line x1="0" y1="125" x2="335" y2="115" stroke="#5277C3" stroke-width="0.8" opacity="0.35" />
  <line x1="0" y1="155" x2="335" y2="130" stroke="#5277C3" stroke-width="0.7" opacity="0.3" />
  <line x1="0" y1="180" x2="335" y2="145" stroke="#5277C3" stroke-width="0.7" opacity="0.3" />

  <!-- Left shelf front edge (vertical near edge) -->
  <line x1="0" y1="15" x2="0" y2="200" stroke="#7eb5e6" stroke-width="1.5" opacity="0.4" />

  <!-- Products on left shelves — neon-outlined boxes, near to far -->
  <!-- Near row - large boxes -->
  <rect x="10" y="52" width="22" height="35" rx="2" fill="none" stroke="#ff6ec7" stroke-width="1" opacity="0.5" />
  <rect x="36" y="55" width="20" height="32" rx="2" fill="none" stroke="#f9a825" stroke-width="1" opacity="0.45" />
  <rect x="60" y="57" width="18" height="30" rx="2" fill="none" stroke="#7eb5e6" stroke-width="1" opacity="0.4" />
  <rect x="82" y="59" width="17" height="28" rx="2" fill="none" stroke="#ff6ec7" stroke-width="1" opacity="0.38" />
  <rect x="103" y="61" width="16" height="26" rx="2" fill="none" stroke="#e0b0ff" stroke-width="1" opacity="0.35" />
  <rect x="123" y="63" width="15" height="24" rx="2" fill="none" stroke="#f9a825" stroke-width="1" opacity="0.32" />

  <!-- Second row -->
  <rect x="10" y="92" width="22" height="30" rx="2" fill="none" stroke="#7eb5e6" stroke-width="0.9" opacity="0.4" />
  <rect x="36" y="93" width="20" height="28" rx="2" fill="none" stroke="#e0b0ff" stroke-width="0.9" opacity="0.38" />
  <rect x="60" y="94" width="18" height="26" rx="2" fill="none" stroke="#f9a825" stroke-width="0.9" opacity="0.35" />
  <rect x="82" y="95" width="17" height="24" rx="2" fill="none" stroke="#ff6ec7" stroke-width="0.9" opacity="0.33" />
  <rect x="103" y="96" width="16" height="22" rx="2" fill="none" stroke="#7eb5e6" stroke-width="0.9" opacity="0.3" />

  <!-- Third row -->
  <rect x="10" y="127" width="22" height="25" rx="2" fill="none" stroke="#f9a825" stroke-width="0.8" opacity="0.35" />
  <rect x="36" y="127" width="20" height="24" rx="2" fill="none" stroke="#ff6ec7" stroke-width="0.8" opacity="0.33" />
  <rect x="60" y="127" width="18" height="22" rx="2" fill="none" stroke="#e0b0ff" stroke-width="0.8" opacity="0.3" />
  <rect x="82" y="128" width="17" height="20" rx="2" fill="none" stroke="#7eb5e6" stroke-width="0.8" opacity="0.28" />

  <!-- Far products (smaller, fading) -->
  <rect x="145" y="65" width="13" height="20" rx="1" fill="none" stroke="#ff6ec7" stroke-width="0.7" opacity="0.25" />
  <rect x="162" y="66" width="12" height="18" rx="1" fill="none" stroke="#7eb5e6" stroke-width="0.7" opacity="0.22" />
  <rect x="178" y="67" width="11" height="17" rx="1" fill="none" stroke="#f9a825" stroke-width="0.7" opacity="0.2" />
  <rect x="193" y="68" width="10" height="16" rx="1" fill="none" stroke="#e0b0ff" stroke-width="0.7" opacity="0.18" />

  <!-- Electronic shelf labels (ESLs) — Vusion's product! Small glowing tags -->
  <rect x="10" y="87" width="14" height="4" rx="1" fill="#00ff88" opacity="0.5" filter="url(#glow)" />
  <rect x="36" y="88" width="13" height="4" rx="1" fill="#00ff88" opacity="0.45" filter="url(#glow)" />
  <rect x="60" y="89" width="12" height="3.5" rx="1" fill="#00ff88" opacity="0.4" filter="url(#glow)" />
  <rect x="82" y="90" width="11" height="3.5" rx="1" fill="#00ff88" opacity="0.35" filter="url(#glow)" />
  <rect x="103" y="91" width="10" height="3" rx="1" fill="#00ff88" opacity="0.3" filter="url(#glow)" />

  <!-- ESLs second row -->
  <rect x="10" y="122" width="14" height="4" rx="1" fill="#00ff88" opacity="0.4" filter="url(#glow)" />
  <rect x="36" y="122" width="13" height="3.5" rx="1" fill="#00ff88" opacity="0.35" filter="url(#glow)" />
  <rect x="60" y="122" width="12" height="3.5" rx="1" fill="#00ff88" opacity="0.3" filter="url(#glow)" />

  <!-- ================================================================ -->
  <!-- RIGHT SHELVING UNIT (mirror)                                      -->
  <!-- ================================================================ -->

  <!-- Right shelf back panel -->
  <polygon points="800,15 465,72 465,185 800,200" fill="#151230" stroke="#5277C3" stroke-width="0.5" opacity="0.6" />

  <!-- Right shelf rows -->
  <line x1="800" y1="50" x2="465" y2="85" stroke="#5277C3" stroke-width="0.8" opacity="0.35" />
  <line x1="800" y1="90" x2="465" y2="100" stroke="#5277C3" stroke-width="0.8" opacity="0.35" />
  <line x1="800" y1="125" x2="465" y2="115" stroke="#5277C3" stroke-width="0.8" opacity="0.35" />
  <line x1="800" y1="155" x2="465" y2="130" stroke="#5277C3" stroke-width="0.7" opacity="0.3" />
  <line x1="800" y1="180" x2="465" y2="145" stroke="#5277C3" stroke-width="0.7" opacity="0.3" />

  <!-- Right shelf front edge -->
  <line x1="800" y1="15" x2="800" y2="200" stroke="#7eb5e6" stroke-width="1.5" opacity="0.4" />

  <!-- Products on right shelves -->
  <rect x="768" y="52" width="22" height="35" rx="2" fill="none" stroke="#7eb5e6" stroke-width="1" opacity="0.5" />
  <rect x="744" y="55" width="20" height="32" rx="2" fill="none" stroke="#ff6ec7" stroke-width="1" opacity="0.45" />
  <rect x="722" y="57" width="18" height="30" rx="2" fill="none" stroke="#f9a825" stroke-width="1" opacity="0.4" />
  <rect x="701" y="59" width="17" height="28" rx="2" fill="none" stroke="#e0b0ff" stroke-width="1" opacity="0.38" />
  <rect x="681" y="61" width="16" height="26" rx="2" fill="none" stroke="#7eb5e6" stroke-width="1" opacity="0.35" />
  <rect x="662" y="63" width="15" height="24" rx="2" fill="none" stroke="#ff6ec7" stroke-width="1" opacity="0.32" />

  <!-- Second row right -->
  <rect x="768" y="92" width="22" height="30" rx="2" fill="none" stroke="#e0b0ff" stroke-width="0.9" opacity="0.4" />
  <rect x="744" y="93" width="20" height="28" rx="2" fill="none" stroke="#f9a825" stroke-width="0.9" opacity="0.38" />
  <rect x="722" y="94" width="18" height="26" rx="2" fill="none" stroke="#7eb5e6" stroke-width="0.9" opacity="0.35" />
  <rect x="701" y="95" width="17" height="24" rx="2" fill="none" stroke="#e0b0ff" stroke-width="0.9" opacity="0.33" />
  <rect x="681" y="96" width="16" height="22" rx="2" fill="none" stroke="#ff6ec7" stroke-width="0.9" opacity="0.3" />

  <!-- Third row right -->
  <rect x="768" y="127" width="22" height="25" rx="2" fill="none" stroke="#ff6ec7" stroke-width="0.8" opacity="0.35" />
  <rect x="744" y="127" width="20" height="24" rx="2" fill="none" stroke="#7eb5e6" stroke-width="0.8" opacity="0.33" />
  <rect x="722" y="127" width="18" height="22" rx="2" fill="none" stroke="#f9a825" stroke-width="0.8" opacity="0.3" />
  <rect x="701" y="128" width="17" height="20" rx="2" fill="none" stroke="#e0b0ff" stroke-width="0.8" opacity="0.28" />

  <!-- Far products right -->
  <rect x="642" y="65" width="13" height="20" rx="1" fill="none" stroke="#e0b0ff" stroke-width="0.7" opacity="0.25" />
  <rect x="626" y="66" width="12" height="18" rx="1" fill="none" stroke="#f9a825" stroke-width="0.7" opacity="0.22" />
  <rect x="611" y="67" width="11" height="17" rx="1" fill="none" stroke="#ff6ec7" stroke-width="0.7" opacity="0.2" />
  <rect x="597" y="68" width="10" height="16" rx="1" fill="none" stroke="#7eb5e6" stroke-width="0.7" opacity="0.18" />

  <!-- ESLs right side -->
  <rect x="776" y="87" width="14" height="4" rx="1" fill="#00ff88" opacity="0.5" filter="url(#glow)" />
  <rect x="751" y="88" width="13" height="4" rx="1" fill="#00ff88" opacity="0.45" filter="url(#glow)" />
  <rect x="728" y="89" width="12" height="3.5" rx="1" fill="#00ff88" opacity="0.4" filter="url(#glow)" />
  <rect x="707" y="90" width="11" height="3.5" rx="1" fill="#00ff88" opacity="0.35" filter="url(#glow)" />
  <rect x="687" y="91" width="10" height="3" rx="1" fill="#00ff88" opacity="0.3" filter="url(#glow)" />

  <!-- ESLs second row right -->
  <rect x="776" y="122" width="14" height="4" rx="1" fill="#00ff88" opacity="0.4" filter="url(#glow)" />
  <rect x="751" y="122" width="13" height="3.5" rx="1" fill="#00ff88" opacity="0.35" filter="url(#glow)" />
  <rect x="728" y="122" width="12" height="3.5" rx="1" fill="#00ff88" opacity="0.3" filter="url(#glow)" />

  <!-- ================================================================ -->
  <!-- FLOOR — tiled, perspective                                        -->
  <!-- ================================================================ -->

  <!-- Floor base -->
  <polygon points="335,185 465,185 800,200 0,200" fill="url(#floorGrad)" />

  <!-- Floor tile lines converging to vanishing point -->
  <line x1="400" y1="185" x2="0" y2="200" stroke="#5277C3" stroke-width="0.4" opacity="0.15" />
  <line x1="400" y1="185" x2="160" y2="200" stroke="#5277C3" stroke-width="0.4" opacity="0.18" />
  <line x1="400" y1="185" x2="320" y2="200" stroke="#5277C3" stroke-width="0.4" opacity="0.2" />
  <line x1="400" y1="185" x2="480" y2="200" stroke="#5277C3" stroke-width="0.4" opacity="0.2" />
  <line x1="400" y1="185" x2="640" y2="200" stroke="#5277C3" stroke-width="0.4" opacity="0.18" />
  <line x1="400" y1="185" x2="800" y2="200" stroke="#5277C3" stroke-width="0.4" opacity="0.15" />

  <!-- Floor horizontal tile lines -->
  <line x1="100" y1="192" x2="700" y2="192" stroke="#5277C3" stroke-width="0.3" opacity="0.12" />
  <line x1="200" y1="188" x2="600" y2="188" stroke="#5277C3" stroke-width="0.3" opacity="0.1" />

  <!-- ================================================================ -->
  <!-- VANISHING POINT — subtle glow at the end of the aisle             -->
  <!-- ================================================================ -->
  <circle cx="400" cy="100" r="30" fill="#e0b0ff" opacity="0.06" filter="url(#softGlow)" />
  <circle cx="400" cy="100" r="12" fill="#ffffff" opacity="0.04" filter="url(#softGlow)" />

  <!-- ================================================================ -->
  <!-- TITLE + SUBTITLE — centered, floating in the aisle                -->
  <!-- ================================================================ -->
  <text x="400" y="100" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="700" fill="#ffffff" filter="url(#textGlow)">
    Deep-Rayon
  </text>
  <text x="400" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" letter-spacing="3" fill="#e0b0ff" opacity="0.85">
    FROM AISLES TO INSIGHTS
  </text>

  <!-- ================================================================ -->
  <!-- MEDALLION ARCHITECTURE — Bronze > Silver > Gold on the aisle floor -->
  <!-- ================================================================ -->

  <!-- Bronze -->
  <rect x="340" y="140" width="50" height="16" rx="3" fill="none" stroke="#cd7f32" stroke-width="1.2" opacity="0.7" filter="url(#glow)" />
  <text x="365" y="151" text-anchor="middle" font-family="monospace" font-size="8" fill="#cd7f32" opacity="0.9">BRONZE</text>

  <!-- Arrow Bronze > Silver -->
  <line x1="392" y1="148" x2="402" y2="148" stroke="#e0b0ff" stroke-width="0.8" opacity="0.5" />
  <polygon points="402,146 406,148 402,150" fill="#e0b0ff" opacity="0.5" />

  <!-- Silver -->
  <rect x="408" y="140" width="46" height="16" rx="3" fill="none" stroke="#c0c0c0" stroke-width="1.2" opacity="0.7" filter="url(#glow)" />
  <text x="431" y="151" text-anchor="middle" font-family="monospace" font-size="8" fill="#c0c0c0" opacity="0.9">SILVER</text>

  <!-- Arrow Silver > Gold -->
  <line x1="456" y1="148" x2="466" y2="148" stroke="#e0b0ff" stroke-width="0.8" opacity="0.5" />
  <polygon points="466,146 470,148 466,150" fill="#e0b0ff" opacity="0.5" />

  <!-- Gold -->
  <rect x="472" y="140" width="40" height="16" rx="3" fill="none" stroke="#f9a825" stroke-width="1.2" opacity="0.7" filter="url(#glow)" />
  <text x="492" y="151" text-anchor="middle" font-family="monospace" font-size="8" fill="#f9a825" opacity="0.9">GOLD</text>
</svg>
